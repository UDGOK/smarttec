<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- SmartTec "Sparky" mascot — a hexagonal battery creature (greptile's lizard equivalent) -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D3B4F"/>
      <stop offset="100%" stop-color="#2A2839"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28E99F"/>
      <stop offset="100%" stop-color="#1FCC85"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#28E99F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#28E99F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow halo -->
  <circle cx="300" cy="300" r="280" fill="url(#glow)"/>

  <!-- Dotted decorative background -->
  <g fill="#3D3B4F" opacity="0.15">
    <circle cx="80" cy="120" r="2"/>
    <circle cx="120" cy="80" r="2"/>
    <circle cx="520" cy="100" r="2"/>
    <circle cx="480" cy="140" r="2"/>
    <circle cx="60" cy="480" r="2"/>
    <circle cx="540" cy="500" r="2"/>
    <circle cx="100" cy="540" r="2"/>
  </g>

  <!-- Battery body (large rounded rectangle / hex shape) -->
  <g transform="translate(150 130)">
    <!-- Main body -->
    <path d="M30 0 H270 Q300 0 300 30 V370 Q300 400 270 400 H30 Q0 400 0 370 V30 Q0 0 30 0 Z" fill="url(#bodyGrad)"/>

    <!-- Battery cap -->
    <rect x="100" y="-25" width="100" height="30" rx="6" fill="#3D3B4F"/>
    <rect x="115" y="-32" width="70" height="14" rx="3" fill="#5A586E"/>

    <!-- Inner green belly -->
    <rect x="20" y="60" width="260" height="280" rx="14" fill="url(#bellyGrad)"/>

    <!-- Charge level bars -->
    <g fill="#1FCC85" opacity="0.4">
      <rect x="40" y="80" width="60" height="240" rx="4"/>
      <rect x="120" y="80" width="60" height="240" rx="4"/>
      <rect x="200" y="80" width="60" height="240" rx="4"/>
    </g>
    <g fill="#FFFFFF">
      <rect x="40" y="80" width="60" height="180" rx="4"/>
      <rect x="120" y="80" width="60" height="200" rx="4"/>
      <rect x="200" y="80" width="60" height="160" rx="4"/>
    </g>

    <!-- Eyes -->
    <g>
      <!-- Left eye -->
      <circle cx="100" cy="200" r="22" fill="#FFFFFF"/>
      <circle cx="105" cy="205" r="11" fill="#1A1A24"/>
      <circle cx="109" cy="201" r="4" fill="#FFFFFF"/>
      <!-- Right eye -->
      <circle cx="200" cy="200" r="22" fill="#FFFFFF"/>
      <circle cx="205" cy="205" r="11" fill="#1A1A24"/>
      <circle cx="209" cy="201" r="4" fill="#FFFFFF"/>
    </g>

    <!-- Smile -->
    <path d="M115 245 Q150 275 185 245" stroke="#1A1A24" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Cheeks (small mint blushes) -->
    <circle cx="75" cy="235" r="10" fill="#FFBCB3" opacity="0.7"/>
    <circle cx="225" cy="235" r="10" fill="#FFBCB3" opacity="0.7"/>

    <!-- Tiny bolt/lightning on forehead -->
    <path d="M150 145 L142 165 L152 165 L144 180 L160 158 L150 158 Z" fill="#28E99F"/>

    <!-- Cooling vents on sides -->
    <g stroke="#5A586E" stroke-width="2" stroke-linecap="round">
      <line x1="-5" y1="120" x2="-15" y2="120"/>
      <line x1="-5" y1="135" x2="-15" y2="135"/>
      <line x1="-5" y1="150" x2="-15" y2="150"/>
      <line x1="305" y1="120" x2="315" y2="120"/>
      <line x1="305" y1="135" x2="315" y2="135"/>
      <line x1="305" y1="150" x2="315" y2="150"/>
    </g>
  </g>

  <!-- Sparkle accents -->
  <g fill="#28E99F">
    <path d="M70 250 L75 240 L80 250 L75 260 Z"/>
    <path d="M540 280 L545 270 L550 280 L545 290 Z"/>
    <path d="M80 350 L84 343 L88 350 L84 357 Z"/>
  </g>

  <!-- Hand-drawn "zap!" annotation -->
  <text x="470" y="450" font-family="cursive" font-size="28" fill="#28E99F" font-style="italic">zap!</text>
</svg>