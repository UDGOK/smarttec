<text x="36" y="86" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="900" fill="#3D3B4F">Gigawatts, campuses, pods — where small sites fit</text><text x="60" y="158" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="#3D3B4F">KOREA NATIONAL PLAN 2035</text>
<rect x="60" y="170" width="880" height="44" fill="#3D3B4F" />
<text x="950" y="199" font-family="Courier New,monospace" font-size="16" font-weight="bold" fill="#3D3B4F">18.4 GW</text><text x="60" y="268" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="#3D3B4F">SK+AWS ULSAN CAMPUS 2029</text>
<rect x="60" y="280" width="633" height="44" fill="#3D3B4F" />
<text x="703" y="309" font-family="Courier New,monospace" font-size="16" font-weight="bold" fill="#3D3B4F">103 MW</text><text x="60" y="378" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="#3D3B4F">KDDI OSAKA AI POD</text>
<rect x="60" y="390" width="484" height="44" fill="#3D3B4F" />
<text x="554" y="419" font-family="Courier New,monospace" font-size="16" font-weight="bold" fill="#3D3B4F">~10 MW cls</text><text x="60" y="488" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="bold" fill="#3D3B4F">SMARTTEC MEAD PHASE 1</text>
<rect x="60" y="500" width="246" height="44" fill="#28E99F" />
<text x="316" y="529" font-family="Courier New,monospace" font-size="16" font-weight="bold" fill="#3D3B4F">110 kW</text><text x="60" y="604" font-family="Courier New,monospace" font-size="13" fill="#8b8a99">Log scale — each step ≈ one order of magnitude. Japan's urban-pod strategy shows the small end of the curve is a deliberate design point, not a compromise.</text></svg>