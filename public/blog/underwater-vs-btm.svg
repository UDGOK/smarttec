<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
<rect width="1200" height="640" fill="#E9E9E9"/>
<rect x="0" y="0" width="10" height="640" fill="#28E99F"/>
<text x="36" y="46" font-family="Courier New,monospace" font-size="15" letter-spacing="2" fill="#0aa96e">[ HAINAN, CHINA vs MEAD, OKLAHOMA ]</text>
<text x="36" y="86" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="900" fill="#3D3B4F">Two answers to the same problem: power + heat</text><rect x="60" y="130" width="520" height="400" fill="#FFFFFF" stroke="#3D3B4F" stroke-width="2.5"/>
<rect x="60" y="130" width="520" height="56" fill="#3D3B4F"/>
<text x="82" y="166" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#E9E9E9">SUBSEA CAPSULE · HAINAN</text><text x="82" y="226" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ Seawater as free heat sink</text><text x="82" y="272" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ 40–60% less power vs land sites*</text><text x="82" y="318" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ No land, no freshwater draw</text><text x="82" y="364" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ Sealed pods · lift-to-repair</text><text x="82" y="410" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ Thermal plume &lt;1°C at 2 m*</text><rect x="620" y="130" width="520" height="400" fill="#FFFFFF" stroke="#3D3B4F" stroke-width="2.5"/>
<rect x="620" y="130" width="520" height="56" fill="#28E99F"/>
<text x="642" y="166" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#17321f">BEHIND-THE-METER · MEAD</text><text x="642" y="226" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ z1power LFP absorbs grid faults</text><text x="642" y="272" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ Owned land + 3 MVA transformer</text><text x="642" y="318" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ ~$0.08/kWh Oklahoma power</text><text x="642" y="364" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ Walk-in maintenance, same day</text><text x="642" y="410" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#3D3B4F">→ Sub-10ms failover by design</text><text x="60" y="576" font-family="Courier New,monospace" font-size="13" fill="#8b8a99">*Reported by operator HiCloud / People's Daily; independent long-term data still limited. Both designs remove the grid+cooling tax — by different physics.</text></svg>