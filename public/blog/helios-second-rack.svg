<text x="82" y="166" font-family="Arial,Helvetica,sans-serif" font-size="19" font-weight="bold" fill="#E9E9E9">NVIDIA RACK-SCALE (INCUMBENT)</text><text x="82" y="226" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ GB200 NVL72 shipping · Vera Rubin next</text><text x="82" y="272" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ 72 GPUs · 13.5 TB HBM3e (GB200)</text><text x="82" y="318" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ CUDA — the software moat</text><text x="82" y="364" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ Training + inference, proven at scale</text><text x="82" y="410" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ Every hyperscaler already deployed</text><rect x="620" y="130" width="520" height="380" fill="#FFFFFF" stroke="#3D3B4F" stroke-width="2.5"/>
