<text x="642" y="166" font-family="Arial,Helvetica,sans-serif" font-size="19" font-weight="bold" fill="#17321f">AMD HELIOS (CHALLENGER)</text><text x="642" y="226" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ Ships H2 2026 · Microsoft first at scale</text><text x="642" y="272" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ 72× Instinct MI455X · 31.1 TB HBM4</text><text x="642" y="318" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ EPYC Venice + Pensando + ROCm</text><text x="642" y="364" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ Positioned inference-first on Azure</text><text x="642" y="410" font-family="Arial,Helvetica,sans-serif" font-size="15.5" fill="#3D3B4F">→ The open-platform rack bet</text><text x="60" y="576" font-family="Courier New,monospace" font-size="13" fill="#8b8a99">Sources: AMD, Microsoft, Tom's Hardware (Jul 2026). The unit of competition shifted from chip to integrated rack — and buyers finally have a second one.</text></svg>