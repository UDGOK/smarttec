<text x="168" y="447" font-family="Courier New,monospace" font-size="15" fill="#3D3B4F">30–80 kW overhead</text><text x="60" y="536" font-family="Courier New,monospace" font-size="13" fill="#8b8a99">Every watt of overhead is billed at your power rate 8,760 hours a year. At $0.08/kWh, the air-vs-immersion gap on 1 MW of IT is ~$260–360K/yr.</text></svg>