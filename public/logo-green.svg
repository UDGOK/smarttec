<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60" role="img" aria-label="SmartTec">
  <title>SmartTec</title>

  <!-- MARK: battery cell (all green for dark backgrounds) -->
  <g transform="translate(0 6)">
    <!-- positive terminal -->
    <rect x="11" y="0" width="14" height="6" rx="1.5" fill="#28E99F"/>
    <!-- cell body -->
    <rect x="0" y="6" width="36" height="42" rx="5" fill="#28E99F"/>
    <!-- highlight bevel -->
    <path d="M5 6 L0 11 V12 L5 9 Z" fill="#5FFFB7" opacity="0.7"/>
    <!-- inner panel (slate, looks like screen) -->
    <rect x="4" y="10" width="28" height="34" rx="3" fill="#3D3B4F"/>
    <!-- subtle halftone inside screen -->
    <rect x="4" y="10" width="28" height="34" rx="3" fill="#28E99F" opacity="0.06"/>
    <!-- bolt (greptile-green, on the slate screen) -->
    <path d="M22 14 L13 26 L19 26 L15 40 L26 25 L20 25 L24 14 Z" fill="#28E99F"/>
    <!-- spark dot -->
    <circle cx="30" cy="13" r="1.5" fill="#28E99F"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(46 0)" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="900" font-size="36" letter-spacing="-1.2">
    <text x="0" y="42" fill="#28E99F">Smart</text>
    <text x="103" y="42" fill="#FDFCF9">Tec</text>
  </g>

  <!-- accent underline -->
  <rect x="46" y="49" width="142" height="1.5" fill="#28E99F" opacity="0.3"/>
</svg>
